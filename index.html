<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Walk & Earn</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  margin: 0;
  padding: 20px;
}

.section { margin-top:20px; padding:15px; background:#111; border-radius:10px; }

.btn{
display:inline-block;
margin-top:10px;
padding:10px 15px;
border-radius:8px;
background:#00c853;
color:#fff;
font-weight:bold;
cursor:pointer;
text-align:center;
}

.hidden{display:none}

#road{
width:100%;
height:120px;
background:#222;
border-radius:10px;
overflow:hidden;
position:relative;
}

#walker{
position:absolute;
bottom:10px;
left:0;
font-size:40px;
transition:left 1s linear;
}

#claimSuccessMsg{
position:absolute;
top:50px;
left:50%;
transform:translateX(-50%);
background:#00c853;
color:#fff;
padding:15px 20px;
border-radius:10px;
font-weight:bold;
display:none;
z-index:9999;
}

#joinPopup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
z-index:9999;
}

</style>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
</head>

<body>

<div id="joinPopup">
<h2>📢 Join Our Telegram Channel to Continue</h2>
<button onclick="joinChannelClicked()">👉 Join @earnzoners</button>
</div>

<div id="mainPage" style="display:none;">

<h1>🚶 Walk & Earn Points</h1>
<p>Points: <span id="points">0</span> | Energy: <span id="energy">50</span></p>

<div class="section">

<div id="road">
<div id="walker">🚶</div>
</div>

<p id="walkMsg">Start walking to earn points</p>

<div class="btn" id="startWalkBtn">Start Walking</div>
<div class="btn hidden" id="claimBtn">🎁 Claim 3000 Points</div>

</div>

<div id="claimSuccessMsg">
🎉 You're successful! Claim 3000 points welcome bonus.
</div>

<!-- TASK SECTION (UNCHANGED) -->
<div class="section">
<h2>📋 Tasks</h2>

<div id="taskIntro">
<div class="btn" id="startTasksBtn">Start Tasks</div>
</div>

<div id="adsgram-container" class="hidden"></div>

<div id="nextTaskBtnContainer" class="hidden">
<div class="btn" id="nextTaskBtn">➡️ Next Task</div>
</div>

<div id="finalTaskBtnContainer" class="hidden">
<div class="btn" id="finalTaskBtn">🏁 Finish Tasks</div>
</div>

</div>

<!-- WITHDRAW SECTION (UNCHANGED) -->
<div class="section">

<h2>💳 Withdraw</h2>

<select id="method">
<option>Litecoin</option>
<option>USDT</option>
<option>Payeer</option>
<option>Bank</option>
</select>

<input id="address" placeholder="Wallet or account"/>
<input id="amount" placeholder="Amount"/>

<div class="btn" id="withdrawBtn">Request Withdraw</div>

</div>

</div>

<script>

const webApp = Telegram.WebApp;

let points = parseInt(localStorage.getItem("points")||"0");
let energy = parseInt(localStorage.getItem("energy")||"50");

function updateUI(){
document.getElementById("points").innerText=points
document.getElementById("energy").innerText=energy
}

function saveState(){
localStorage.setItem("points",points)
localStorage.setItem("energy",energy)
}

/* JOIN */

function joinChannelClicked(){
window.open("https://t.me/crytocurrentupdate","_blank")
document.getElementById("joinPopup").style.display="none"
document.getElementById("mainPage").style.display="block"
}

/* WALK SYSTEM */

let walkTimer=null
let adTimer=null
let distance=0

const walker=document.getElementById("walker")
const claimBtn=document.getElementById("claimBtn")

document.getElementById("startWalkBtn").onclick=function(){

if(walkTimer) return

walkTimer=setInterval(()=>{

distance+=5

walker.style.left=distance+"px"

if(distance>250){
claimBtn.classList.remove("hidden")
}

},1000)

/* ADS EVERY 30 SEC */

adTimer=setInterval(()=>{

try{
const ad=window.Adsgram.init({blockId:"23731"})
ad.show()
}catch(e){}

},30000)

}

/* CLAIM */

claimBtn.onclick=function(){

points+=3000

saveState()
updateUI()

document.getElementById("claimSuccessMsg").style.display="block"

setTimeout(()=>{
document.getElementById("claimSuccessMsg").style.display="none"
},30000)

distance=0
walker.style.left="0px"
claimBtn.classList.add("hidden")

}

/* LOAD */

document.addEventListener("DOMContentLoaded",()=>{

updateUI()

setTimeout(()=>{
document.getElementById("joinPopup").style.display="flex"
},2000)

})

</script>

</body>
</html>
